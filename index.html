<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0a0e14" />
<title>הכספת של אוקלידס</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0e14;
    --bg-2: #11161f;
    --panel: #161d2b;
    --panel-2: #1d2636;
    --border: #2a3650;
    --text: #e8eef7;
    --text-dim: #93a1b8;
    --green: #2bff88;
    --cyan: #38e1ff;
    --orange: #ff9d3c;
    --red: #ff4d6d;
    --gold: #ffd34d;
    --shadow: 0 10px 40px rgba(0,0,0,.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
  }

  body {
    font-family: 'Rubik', 'Assistant', system-ui, -apple-system, sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(56,225,255,.08), transparent 60%),
      radial-gradient(1000px 500px at -10% 110%, rgba(43,255,136,.06), transparent 60%),
      var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    overflow-x: hidden;
  }

  /* ---------- Top bar ---------- */
  .topbar {
    width: 100%;
    max-width: 1180px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 900;
    letter-spacing: .5px;
  }

  .brand .lock-ico {
    width: 30px; height: 30px;
    filter: drop-shadow(0 0 6px rgba(56,225,255,.6));
  }

  .brand .name { font-size: 1.1rem; }
  .brand .name b { color: var(--cyan); }

  .status-chips { display: flex; gap: 8px; flex-wrap: wrap; }

  .chip {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: .9rem;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .chip .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); }
  .chip.timer { color: var(--cyan); font-variant-numeric: tabular-nums; }
  .chip.room { color: var(--orange); }

  /* ---------- Progress rail ---------- */
  .rail {
    width: 100%;
    max-width: 1180px;
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .rail .seg {
    flex: 1;
    height: 18px;
    border-radius: 999px;
    background: var(--panel-2);
    overflow: hidden;
    position: relative;
    transition: transform .1s, box-shadow .1s;
  }
  .rail .seg:hover { transform: translateY(-1px); box-shadow: 0 0 0 2px var(--cyan); }
  .rail .seg.done { background: var(--green); box-shadow: 0 0 10px rgba(43,255,136,.5); }
  .rail .seg.active { background: linear-gradient(90deg, var(--cyan), var(--panel-2)); }

  /* ---------- Card ---------- */
  .stage {
    width: 100%;
    max-width: 920px;
    background: linear-gradient(180deg, var(--panel), var(--bg-2));
    border: 1px solid var(--border);
    border-radius: 22px;
    box-shadow: var(--shadow);
    padding: 26px;
    position: relative;
  }

  .stage.shake { animation: shake .5s; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    15% { transform: translateX(-12px); }
    30% { transform: translateX(10px); }
    45% { transform: translateX(-8px); }
    60% { transform: translateX(6px); }
    75% { transform: translateX(-3px); }
  }

  .room-title {
    font-size: 1.5rem;
    font-weight: 900;
    margin-bottom: 4px;
  }
  .room-sub { color: var(--text-dim); font-size: .95rem; margin-bottom: 18px; }

  .phase-tag {
    display: inline-block;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--cyan);
    border-radius: 8px;
    padding: 3px 10px;
    font-size: .8rem;
    font-weight: 700;
    margin-bottom: 12px;
  }

  /* SVG diagram */
  .diagram {
    background: #0c1119;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px;
    margin: 0 auto 20px;
    display: flex;
    justify-content: center;
  }
  .diagram svg { max-width: 100%; height: auto; }

  .diagram-note {
    text-align: center;
    color: var(--text-dim);
    font-size: .78rem;
    margin: -10px auto 16px;
    opacity: .85;
  }

  /* Level selection */
  .level-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-top: 22px;
  }
  .level-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 16px;
    padding: 18px 8px;
    font-family: inherit;
    cursor: pointer;
    transition: transform .12s, border-color .12s, background .12s;
  }
  .level-btn:hover { border-color: var(--cyan); transform: translateY(-3px); background: var(--panel); }
  .level-btn .lv-num { font-size: 1.15rem; font-weight: 900; color: var(--cyan); }
  .level-btn .lv-grade { font-size: .8rem; color: var(--text-dim); font-weight: 700; }

  /* Room 5 — true/false list */
  .r5-list { display: grid; gap: 10px; margin: 18px 0 20px; }
  .r5-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    flex-wrap: wrap;
  }
  .r5-text { font-weight: 600; line-height: 1.5; flex: 1; min-width: 200px; }
  .r5-btns { display: flex; gap: 8px; flex-shrink: 0; }
  .r5-tf {
    background: #0c1119;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 9px 16px;
    font-family: inherit;
    font-weight: 700;
    font-size: .92rem;
    cursor: pointer;
    transition: transform .1s, border-color .1s, background .1s;
  }
  .r5-tf:hover:not(:disabled) { border-color: var(--cyan); transform: translateY(-1px); }
  .r5-tf.sel { background: rgba(56,225,255,.18); border-color: var(--cyan); color: var(--cyan); }
  .r5-tf:disabled { cursor: default; opacity: .85; }
  .r5-star { font-size: 1.15rem; font-weight: 900; margin-inline-start: 6px; }
  .r5-star.ok { color: var(--green); text-shadow: 0 0 8px rgba(43,255,136,.7); }
  .r5-star.bad { color: var(--red); text-shadow: 0 0 8px rgba(255,77,109,.6); }

  .question {
    font-size: 1.15rem;
    font-weight: 700;
    margin-bottom: 16px;
    line-height: 1.5;
  }

  .options { display: grid; gap: 10px; }

  .opt {
    text-align: right;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 14px;
    padding: 14px 18px;
    font-family: inherit;
    font-size: 1.02rem;
    font-weight: 500;
    cursor: pointer;
    transition: transform .12s, border-color .12s, background .12s;
    line-height: 1.45;
  }
  .opt:hover { border-color: var(--cyan); transform: translateY(-1px); }
  .opt.correct { background: rgba(43,255,136,.15); border-color: var(--green); color: var(--green); }
  .opt.wrong { background: rgba(255,77,109,.13); border-color: var(--red); color: var(--red); }
  .opt:disabled { cursor: default; opacity: .9; }

  /* Numeric input stage */
  .numwrap { display: flex; gap: 10px; flex-wrap: wrap; align-items: stretch; }
  .num-input {
    flex: 1;
    min-width: 160px;
    background: #0c1119;
    border: 2px solid var(--border);
    border-radius: 14px;
    color: var(--cyan);
    font-family: inherit;
    font-size: 1.6rem;
    font-weight: 900;
    text-align: center;
    padding: 14px;
    letter-spacing: 3px;
    outline: none;
    transition: border-color .15s;
  }
  .num-input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(56,225,255,.15); }
  .num-suffix { color: var(--text-dim); align-self: center; font-weight: 700; }

  .btn {
    background: linear-gradient(180deg, var(--cyan), #1aa9d6);
    color: #042230;
    border: none;
    border-radius: 14px;
    padding: 14px 26px;
    font-family: inherit;
    font-size: 1.05rem;
    font-weight: 900;
    cursor: pointer;
    transition: transform .12s, filter .12s;
    box-shadow: 0 6px 18px rgba(56,225,255,.25);
  }
  .btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
  .btn:active { transform: translateY(0); }
  .btn.green { background: linear-gradient(180deg, var(--green), #16c46b); color: #053018; box-shadow: 0 6px 18px rgba(43,255,136,.25); }
  .btn.big { width: 100%; padding: 18px; font-size: 1.2rem; margin-top: 8px; }

  .feedback { margin-top: 14px; font-weight: 700; min-height: 22px; }
  .feedback.ok { color: var(--green); }
  .feedback.err { color: var(--red); }

  /* Intro */
  .intro { text-align: center; }
  .intro .big-logo { font-size: 2.4rem; font-weight: 900; margin-bottom: 6px; }
  .intro .big-logo .euclid { color: var(--cyan); }
  .intro .tagline { color: var(--gold); font-weight: 700; margin-bottom: 18px; }
  .intro p { color: var(--text-dim); line-height: 1.7; max-width: 640px; margin: 0 auto 14px; }

  /* Hint */
  .hint-float {
    position: fixed;
    bottom: 22px;
    left: 22px;
    background: linear-gradient(180deg, var(--orange), #e07d1f);
    color: #2a1500;
    border: none;
    border-radius: 999px;
    padding: 14px 22px;
    font-family: inherit;
    font-weight: 900;
    font-size: 1rem;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(255,157,60,.4);
    z-index: 50;
    animation: pop .3s ease;
  }
  @keyframes pop { from { transform: scale(.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .hint-box {
    margin-top: 16px;
    background: rgba(255,157,60,.1);
    border: 1px solid var(--orange);
    border-radius: 14px;
    padding: 14px 18px;
    color: var(--orange);
    font-weight: 600;
    line-height: 1.5;
  }

  /* Keypad */
  .keypad-wrap { text-align: center; }
  .code-display {
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: 10px;
    color: var(--cyan);
    background: #0c1119;
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin: 0 auto 18px;
    min-height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    direction: ltr;
    font-variant-numeric: tabular-nums;
  }
  .keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    max-width: 320px;
    margin: 0 auto 16px;
  }
  .key {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 14px;
    padding: 20px 0;
    font-family: inherit;
    font-size: 1.5rem;
    font-weight: 900;
    cursor: pointer;
    transition: transform .1s, background .1s;
  }
  .key:hover { background: var(--panel); transform: translateY(-2px); }
  .key:active { transform: scale(.94); }
  .key.wide { grid-column: span 1; }
  .key.del { color: var(--orange); }
  .key.enter { color: var(--green); }

  /* Victory */
  .victory { text-align: center; }
  .victory .v-title {
    font-size: 2.4rem;
    font-weight: 900;
    color: var(--green);
    text-shadow: 0 0 24px rgba(43,255,136,.6);
    margin-bottom: 10px;
  }
  .victory .v-time {
    font-size: 1.6rem;
    color: var(--cyan);
    font-variant-numeric: tabular-nums;
    margin-bottom: 8px;
  }
  .victory p { color: var(--text-dim); margin-bottom: 18px; }

  canvas#confetti {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 100;
  }

  /* SVG label helpers */
  .svg-label { font-family: 'Rubik', sans-serif; font-weight: 700; }

  /* ---------- Layout + side control panel ---------- */
  .layout {
    width: 100%;
    max-width: 1180px;
    display: flex;
    gap: 16px;
    align-items: flex-start;
    justify-content: center;
  }
  .layout #app { flex: 1 1 auto; min-width: 0; display: flex; justify-content: center; }

  /* Safe-style side control panel */
  .code-panel {
    flex: 0 0 230px;
    width: 230px;
    background:
      radial-gradient(120% 60% at 50% 0%, rgba(56,225,255,.06), transparent 60%),
      linear-gradient(160deg, #20283a, #11161f 70%);
    border: 2px solid #38445f;
    border-radius: 20px;
    box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.06), inset 0 0 40px rgba(0,0,0,.5);
    padding: 18px 16px 20px;
    position: sticky;
    top: 16px;
  }
  /* corner bolts for the safe-door feel */
  .code-panel::before, .code-panel::after {
    content: "";
    position: absolute;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #6b7690, #2a3142);
    box-shadow: 0 0 4px rgba(0,0,0,.6);
    top: 10px;
  }
  .code-panel::before { right: 10px; }
  .code-panel::after { left: 10px; }
  .cp-head {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    border-bottom: 1px dashed #38445f;
    padding-bottom: 10px;
  }
  .cp-ico { font-size: 1.25rem; filter: drop-shadow(0 0 4px rgba(56,225,255,.5)); }
  .cp-title { font-weight: 900; font-size: 1.05rem; letter-spacing: .5px; }
  .cp-sub {
    color: var(--text-dim); font-size: .8rem; margin: 8px 0 14px;
    text-align: center; text-transform: uppercase; letter-spacing: 2px;
  }
  /* Single-line LED safe display window for all 8 digits */
  .cp-display {
    display: flex;
    justify-content: center;
    gap: 4px;
    background: linear-gradient(180deg, #05080d, #0c1119);
    border: 1px solid #2a3650;
    border-radius: 10px;
    box-shadow: inset 0 2px 8px rgba(0,0,0,.8);
    padding: 14px 10px;
    direction: ltr;
  }
  .cp-digit {
    font-family: 'Courier New', monospace;
    font-size: 1.5rem;
    font-weight: 900;
    width: 18px;
    text-align: center;
    color: #3a4a63;
    font-variant-numeric: tabular-nums;
    transition: color .25s, text-shadow .25s;
  }
  .cp-digit.on {
    color: var(--green);
    text-shadow: 0 0 10px rgba(43,255,136,.85);
  }
  .cp-digit.pop { animation: cpPop .6s ease; }
  /* small dot separators between the four 2-digit codes */
  .cp-sep {
    width: 4px;
    align-self: center;
    color: #3a4a63;
    font-weight: 900;
  }
  @keyframes cpPop {
    0% { transform: scale(.6); }
    50% { transform: scale(1.35); text-shadow: 0 0 18px rgba(43,255,136,1); }
    100% { transform: scale(1); }
  }
  .cp-legend {
    margin-top: 12px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    direction: ltr;
  }
  .cp-leg {
    text-align: center;
    color: var(--text-dim);
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: 1px;
    transition: color .25s;
  }
  .cp-leg.on { color: var(--green); }

  @media (max-width: 820px) {
    .layout { flex-direction: column; align-items: stretch; }
    .code-panel {
      flex: none; width: 100%; position: static;
      order: -1;
    }
  }

  @media (max-width: 560px) {
    .stage { padding: 18px; border-radius: 18px; }
    .room-title { font-size: 1.25rem; }
    .question { font-size: 1.05rem; }
    .intro .big-logo { font-size: 1.8rem; }
    .victory .v-title { font-size: 1.8rem; }
  }
</style>
</head>
<body>
  <canvas id="confetti"></canvas>

  <div class="topbar">
    <div class="brand">
      <svg class="lock-ico" viewBox="0 0 24 24" fill="none" stroke="#38e1ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        <circle cx="12" cy="16" r="1.4" fill="#38e1ff"/>
      </svg>
      <span class="name">הכספת של <b>אוקלידס</b></span>
    </div>
    <div class="status-chips" id="statusChips" style="display:none">
      <span class="chip room" id="roomChip">מתחם 1</span>
      <span class="chip timer" id="timerChip"><span class="dot"></span><span id="timerText">00:00</span></span>
    </div>
  </div>

  <div class="rail" id="rail" style="display:none"></div>

  <div class="layout">
    <div id="app"></div>
    <aside class="code-panel" id="codePanel" style="display:none">
      <div class="cp-head">
        <span class="cp-ico">🔐</span>
        <span class="cp-title">לוח הבקרה</span>
      </div>
      <div class="cp-sub">קוד הכספת</div>
      <div class="cp-display" id="cpDisplay"></div>
      <div class="cp-legend" id="cpLegend"></div>
    </aside>
  </div>

  <button class="hint-float" id="hintBtn" style="display:none" onclick="showHint()">💡 בקש רמז</button>

<script>
"use strict";

/* =========================================================================
   הכספת של אוקלידס — Euclid's Safe
   Single-file client-side escape room. Zero dependencies.
   ========================================================================= */

const STORAGE_KEY = "euclid_safe_v1";
const VARIANT_KEY = "euclid_safe_variants_v1"; // persists last-used variant per room (across plays)

// Grade label per level (for the level-selection screen).
const LEVEL_GRADES = { 1: "כיתה ח'", 2: "כיתה ח'", 3: "כיתה ט'", 4: "כיתה י'", 5: "כיתה י'" };

// ---- Game data ------------------------------------------------------------
// Each room has fixed structure / relation / numeric questions plus 5 numeric
// variants. On every play one variant is chosen at random and never repeats the
// variant used in the previous play (persisted in VARIANT_KEY).
const ROOMS = [
  {
    id: 1,
    title: "חדר 1: \"חדר המראות\"",
    sub: "רמה 1 · כיתה ח'",
    svg: "room1",
    structureQ: "זהו את המבנה הגיאומטרי שעל קיר הלייזרים:",
    structureOptions: ["ישרים מקבילים", "ישרים נחתכים", "אלכסונים", "שני משולשים שווי שוקיים"],
    structureCorrect: 1,
    relationQ: "מהו הקשר הגיאומטרי בין הזווית הנתונה לזווית החסרה?",
    relationOptions: ["זוויות קודקודיות", "זוויות צמודות", "זוויות מתחלפות"],
    numericQ: "הזינו את קוד הדלת (גודל הזווית החסרה):",
    variants: [
      { given: 115, relation: "adjacent", relCorrect: 1, answer: 65 },
      { given: 122, relation: "vertical", relCorrect: 0, answer: 122 },
      { given: 138, relation: "adjacent", relCorrect: 1, answer: 42 },
      { given: 105, relation: "vertical", relCorrect: 0, answer: 105 },
      { given: 128, relation: "adjacent", relCorrect: 1, answer: 52 },
    ],
  },
  {
    id: 2,
    title: "חדר 2: \"מסדרון המקבילים\"",
    sub: "רמה 2 · כיתה ח'",
    svg: "room2",
    structureQ: "זהו את המבנה הגיאומטרי המוצג במסילה:",
    structureOptions: ["ישרים מקבילים וישר חותך", "מקבילית", "קווים נחתכים", "טרפז"],
    structureCorrect: 0,
    relationQ: "איזה משפט גיאומטרי מגדיר את היחס בין הזוויות?",
    relationOptions: [
      "בין ישרים מקבילים, זוויות מתאימות שוות זו לזו",
      "בין ישרים מקבילים, זוויות מתחלפות שוות זו לזו",
      "בין ישרים מקבילים, זוויות חד-צדדיות משלימות ל-180°",
    ],
    numericQ: "חשבו את גודל הזווית החסרה להרמת המחסום:",
    variants: [
      { given: 73, relation: "corresponding", relCorrect: 0, answer: 73 },
      { given: 68, relation: "alternate", relCorrect: 1, answer: 68 },
      { given: 110, relation: "cointerior", relCorrect: 2, answer: 70 },
      { given: 122, relation: "corresponding", relCorrect: 0, answer: 122 },
      { given: 55, relation: "alternate", relCorrect: 1, answer: 55 },
    ],
  },
  {
    id: 3,
    title: "חדר 3: \"הגשר המשולש\"",
    sub: "רמה 3 · כיתה ט'",

// ---- State ----------------------------------------------------------------
function freshState() {
  return {
    currentRoom: 0,      // 0 intro, 1-5 puzzle rooms
    currentPhase: 1,     // 1-3 within a room
    collectedCodes: [],  // numeric answers per room
    elapsed: 0,          // seconds
    wrongAttempts: 0,    // consecutive wrong in current room
    finished: false,
    finalTime: 0,
    startLevel: 1,       // level the player chose to start from
    variants: {},        // roomId -> chosen variant index for this play
    room5Sel: [],        // player's true/false marks (bool|null)
    room5Revealed: false,
    room5Attempts: 0,
  };
}
let state = freshState();

let timerInterval = null;

// ---- Persistence ----------------------------------------------------------
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && typeof parsed === "object") state = Object.assign(state, parsed);
    }
  } catch (e) {}
}

// ---- Variant selection (no repeat between consecutive plays) ---------------
function loadVarHistory() {
  try { return JSON.parse(localStorage.getItem(VARIANT_KEY)) || {}; }
  catch (e) { return {}; }
}
function saveVarHistory(h) {
  try { localStorage.setItem(VARIANT_KEY, JSON.stringify(h)); } catch (e) {}
}
// Returns the chosen variant for a room, picking a fresh one (avoiding the
// previous play's variant) the first time the room is entered in this play.
function ensureVariant(roomId) {
  if (!state.variants) state.variants = {};
  if (state.variants[roomId] != null) return state.variants[roomId];
  const room = ROOMS[roomId - 1];
  const n = room.variants.length;
  const hist = loadVarHistory();
  const last = hist[roomId];
  let idx = Math.floor(Math.random() * n);
  if (n > 1 && idx === last) idx = (idx + 1) % n; // never repeat consecutive play
  state.variants[roomId] = idx;
  hist[roomId] = idx;
  saveVarHistory(hist);
  save();
  return idx;
}
function curVariant(roomId) {
  return ROOMS[roomId - 1].variants[ensureVariant(roomId)];
}
// Builds a variant-aware hint for a puzzle room.
function roomHint(roomId) {
  const v = curVariant(roomId);
  switch (roomId) {
    case 1:
      return v.relation === "vertical"
        ? `הזוויות קודקודיות — הזווית החסרה שווה לזווית הנתונה (${v.given}°).`
        : `הזוויות צמודות — חסרו את הזווית הנתונה מ-180°: 180 − ${v.given} = ?`;
    case 2:
      if (v.relation === "cointerior")
        return `זוויות חד-צדדיות בין מקבילים משלימות ל-180°: 180 − ${v.given} = ?`;
      return `זוויות ${v.relation === "alternate" ? "מתחלפות" : "מתאימות"} בין מקבילים שוות — הזווית החסרה זהה לנתונה (${v.given}°).`;
    case 3:
      return `המשולשים חופפים (ז.צ.ז). הזווית המתאימה שווה לזווית הנתונה (${v.given}°).`;
    case 4:
      return `במשולשים דומים הזוויות זהות: 180 − ${v.a} − ${v.b} = ?`;
    default:
      return "";
  }
}

// ---- Timer ----------------------------------------------------------------
function fmtTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return String(m).padStart(2, "0") + ":" + String(sec).padStart(2, "0");
}
function startTimer() {
  stopTimer();
  timerInterval = setInterval(() => {
    state.elapsed++;
    const el = document.getElementById("timerText");
    if (el) el.textContent = fmtTime(state.elapsed);
    if (state.elapsed % 5 === 0) save();
  }, 1000);
}
function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

// ---- Audio (Web Audio API) ------------------------------------------------
let audioCtx = null;
function ac() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { return null; }
  }
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}
function tone(freq, dur, type = "sine", vol = 0.15, delay = 0) {
  const ctx = ac();
  if (!ctx) return;
  const t0 = ctx.currentTime + delay;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime(vol, t0 + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  osc.connect(gain).connect(ctx.destination);
  osc.start(t0);
  osc.stop(t0 + dur + 0.05);
}
function sndCorrect() { tone(660, 0.12, "triangle", 0.18); tone(880, 0.18, "triangle", 0.16, 0.1); }
function sndWrong()   { tone(180, 0.25, "sawtooth", 0.16); tone(120, 0.3, "sawtooth", 0.14, 0.08); }
function sndClick()   { tone(420, 0.05, "square", 0.08); }
function sndVictory() {
  const notes = [523, 659, 784, 1046, 1318];
  notes.forEach((f, i) => tone(f, 0.4, "triangle", 0.18, i * 0.14));
}

const app = () => document.getElementById("app");

function updateChrome() {
  const chips = document.getElementById("statusChips");
  const rail = document.getElementById("rail");
  const showGame = state.currentRoom >= 1 && !state.finished;

  chips.style.display = (state.currentRoom >= 1) ? "flex" : "none";
  rail.style.display = (state.currentRoom >= 1) ? "flex" : "none";

  document.getElementById("timerText").textContent = fmtTime(state.elapsed);
  const roomChip = document.getElementById("roomChip");
  if (state.finished) roomChip.textContent = "הכספת נפרצה";
  else roomChip.textContent = "מתחם " + state.currentRoom;

  // rail: 5 segments (rooms 1-5). Clickable to jump to any room.
  rail.innerHTML = "";
  const railLabels = ["חדר 1", "חדר 2", "חדר 3", "חדר 4", "חדר 5"];
  for (let i = 1; i <= 5; i++) {
    const seg = document.createElement("div");
    seg.className = "seg";
    if (state.finished || i < state.currentRoom) seg.classList.add("done");
    else if (i === state.currentRoom) seg.classList.add("active");
    seg.style.cursor = "pointer";
    seg.title = "מעבר ל" + railLabels[i - 1];
    seg.addEventListener("click", () => jumpToRoom(i));
    rail.appendChild(seg);
  }

  // hint button only on puzzle rooms after 3 wrong attempts
  const hintBtn = document.getElementById("hintBtn");
  const attempts = (state.currentRoom === 5) ? state.room5Attempts : state.wrongAttempts;
  const canHint = (state.currentRoom >= 1 && state.currentRoom <= 5 && attempts >= 3 && !state.finished);
  hintBtn.style.display = canHint ? "block" : "none";

  updateCodePanel();
}

let shownCodes = 0;
function updateCodePanel() {
  const panel = document.getElementById("codePanel");
  if (!panel) return;
  const show = state.currentRoom >= 1; // visible throughout the game
  panel.style.display = show ? "block" : "none";
  if (!show) { shownCodes = 0; return; }

  const filled = state.collectedCodes.filter((c) => c != null).length;

  // Single-line LED display: 8 digits with separators after every 2.
  const display = document.getElementById("cpDisplay");
  display.innerHTML = "";
  for (let i = 0; i < 4; i++) {
    const code = state.collectedCodes[i];
    const newly = (code != null && i >= shownCodes);
    const two = (code != null) ? String(code).padStart(2, "0") : "––";
    for (let k = 0; k < 2; k++) {
      const d = document.createElement("span");
      d.className = "cp-digit" + (code != null ? " on" : "") + (newly ? " pop" : "");
      d.textContent = two[k];
      display.appendChild(d);
    }
    if (i < 3) {
      const sep = document.createElement("span");
      sep.className = "cp-sep";
      sep.textContent = "·";
      display.appendChild(sep);
    }
  }
  shownCodes = filled;

  // Tiny legend under the strip so each pair is associated with its room.
  const legend = document.getElementById("cpLegend");
  legend.innerHTML = "";
  for (let i = 0; i < 4; i++) {
    const l = document.createElement("span");
    l.className = "cp-leg" + (state.collectedCodes[i] != null ? " on" : "");
    l.textContent = "חדר " + (i + 1);
    legend.appendChild(l);
  }
}

function flashWrong() {
  const card = document.querySelector(".stage");
  if (card) {
    card.classList.remove("shake");
    void card.offsetWidth;
    card.classList.add("shake");
  }
  state.wrongAttempts++;
  save();
  updateChrome();
}

function resetWrong() { state.wrongAttempts = 0; }

// Jump directly to any room (room navigation via the progress rail).
function jumpToRoom(target) {
  if (target < 1 || target > 5) return;
  sndClick();
  state.finished = false;
  state.currentRoom = target;
  state.currentPhase = 1;
  state.wrongAttempts = 0;
  if (!timerInterval) startTimer();
  save();
  render();
}

// ---- Renderers ------------------------------------------------------------
function render() {
  updateChrome();
  if (state.finished) return renderVictory();
  if (state.currentRoom === 0) return renderIntro();
  if (state.currentRoom >= 1 && state.currentRoom <= 4) return renderPuzzleRoom();
  if (state.currentRoom === 5) return renderRoom5();
}

function startGame(level) {
  sndClick();
  const lv = Math.min(5, Math.max(1, level || 1));
  state = freshState();
  state.startLevel = lv;
  state.currentRoom = lv;
  state.currentPhase = 1;
  save();
  startTimer();
  render();
}

  if (!timerInterval && !state.finished) startTimer();
  const room = ROOMS[state.currentRoom - 1];
  const v = curVariant(state.currentRoom);
  const diagram = `<div class="diagram">${svgFor(room.svg, v)}</div>
      <div class="diagram-note">האיור להמחשה ואינו בהכרח בקנה מידה</div>`;
  let inner = "";

  if (state.currentPhase === 1) {
    inner = `
      <span class="phase-tag">זיהוי מבנה</span>
      ${diagram}
      <div class="question">${room.structureQ}</div>
      <div class="options" id="opts">
        ${room.structureOptions.map((o, i) => `<button class="opt" onclick="answerMC(1, ${i})">${o}</button>`).join("")}
      </div>
      <div class="feedback" id="fb"></div>`;
  } else if (state.currentPhase === 2) {
    inner = `
      <span class="phase-tag">הסקת נימוק</span>
      ${diagram}
      <div class="question">${room.relationQ}</div>
      <div class="options" id="opts">
        ${room.relationOptions.map((o, i) => `<button class="opt" onclick="answerMC(2, ${i})">${o}</button>`).join("")}
      </div>
      <div class="feedback" id="fb"></div>`;
  } else {
    inner = `
      <span class="phase-tag">חישוב הזווית</span>
      ${diagram}
      <div class="question">${room.numericQ}</div>
      <div class="numwrap">
        <input class="num-input" id="numInput" type="number" inputmode="numeric"
               placeholder="___" autocomplete="off" />
        <span class="num-suffix">מעלות</span>
        <button class="btn" onclick="submitNum()">בדיקה ✔</button>
      </div>
      <div class="feedback" id="fb"></div>`;
  }

  app().innerHTML = `
    <div class="stage">
      <div class="room-title">${room.title}</div>
      <div class="room-sub">${room.sub}</div>
      ${inner}
    </div>`;

  const ni = document.getElementById("numInput");
  if (ni) {
    ni.focus();
    ni.addEventListener("keydown", (e) => { if (e.key === "Enter") submitNum(); });
  }
}

function answerMC(phase, idx) {
  const room = ROOMS[state.currentRoom - 1];
  const v = curVariant(state.currentRoom);
  let correct;
  if (phase === 1) correct = room.structureCorrect;
  else correct = (room.relationCorrect != null) ? room.relationCorrect : v.relCorrect;
  const btns = document.querySelectorAll("#opts .opt");
  if (idx === correct) {
    sndCorrect();
    btns.forEach((b) => (b.disabled = true));
    btns[idx].classList.add("correct");
    resetWrong();
    save();
    setTimeout(() => {
      state.currentPhase = phase + 1;
      save();
      render();
    }, 650);
  } else {
    sndWrong();
    btns[idx].classList.add("wrong");
    flashWrong();
    const fb = document.getElementById("fb");
    if (fb) { fb.textContent = "לא מדויק. נסו שוב."; fb.className = "feedback err"; }
    setTimeout(() => btns[idx] && btns[idx].classList.remove("wrong"), 600);
  }
}

function submitNum() {
  const room = ROOMS[state.currentRoom - 1];
  const v = curVariant(state.currentRoom);
  const input = document.getElementById("numInput");
  const raw = (input.value || "").toString().replace(/[^\d-]/g, "").trim();
  const fb = document.getElementById("fb");
  if (raw === "") {
    fb.textContent = "נא להזין ערך מספרי.";
    fb.className = "feedback err";
    return;
  }
  const val = parseInt(raw, 10);
  if (val === v.answer) {
    sndCorrect();
    fb.textContent = "✔ קוד תקין! המנעול נפתח...";
    fb.className = "feedback ok";
    input.disabled = true;
    state.collectedCodes[state.currentRoom - 1] = v.answer;
    resetWrong();
    save();
    setTimeout(() => {
      state.currentRoom++;
      state.currentPhase = 1;
      save();
      render();
    }, 850);
  } else {
    sndWrong();
    fb.textContent = "✘ קוד שגוי. בדקו את החישוב.";
    fb.className = "feedback err";
    flashWrong();
    input.select();
  }
}

function renderRoom5() {
  if (!timerInterval && !state.finished) startTimer();
  const stmts = ROOM5.statements;
  if (!Array.isArray(state.room5Sel) || state.room5Sel.length !== stmts.length) {
    state.room5Sel = stmts.map(() => null);
  }
  const revealed = state.room5Revealed;
  const allCorrect = stmts.every((s, i) => state.room5Sel[i] === s.correct);

  const rows = stmts.map((s, i) => {
    const sel = state.room5Sel[i];
    let star = "";
    if (revealed) {
      const ok = (sel === s.correct);
      star = `<span class="r5-star ${ok ? "ok" : "bad"}">${ok ? "★" : "✖"}</span>`;
    }
    const dis = revealed ? "disabled" : "";
    return `
      <div class="r5-row">
        <div class="r5-text">${i + 1}. ${s.t} ${star}</div>
        <div class="r5-btns">
          <button class="r5-tf ${sel === true ? "sel" : ""}" onclick="setRoom5(${i}, true)" ${dis}>נכון</button>
          <button class="r5-tf ${sel === false ? "sel" : ""}" onclick="setRoom5(${i}, false)" ${dis}>לא נכון</button>
        </div>
      </div>`;
  }).join("");

  const allAnswered = state.room5Sel.every((x) => x != null);
  let action;
  if (revealed && !allCorrect) {
    action = `<button class="btn big" onclick="retryRoom5()">✏️ תקנו ונסו שוב</button>`;
  } else {
    action = `<button class="btn big green" id="r5check" onclick="checkRoom5()" ${(!allAnswered || revealed) ? "disabled" : ""}>בדיקת השילוב ✔</button>`;
  }

  app().innerHTML = `
    <div class="stage">
      <div class="room-title">${ROOM5.title}</div>
      <div class="room-sub">${ROOM5.sub}</div>
      <div class="question" style="font-size:1.02rem;font-weight:600;line-height:1.6">${ROOM5.intro}</div>
      <div class="r5-list">${rows}</div>
      ${action}
      <div class="feedback" id="fb"></div>`;
}

function setRoom5(i, val) {
  if (state.room5Revealed) return;
  sndClick();
  if (!Array.isArray(state.room5Sel) || state.room5Sel.length !== ROOM5.statements.length) {
    state.room5Sel = ROOM5.statements.map(() => null);
  }
  state.room5Sel[i] = val;
  save();
  render();
}

function retryRoom5() {
  sndClick();
  state.room5Revealed = false;
  save();
  render();
}

function checkRoom5() {
  const stmts = ROOM5.statements;
  if (!state.room5Sel.every((x) => x != null)) return;
  state.room5Attempts++;
  state.room5Revealed = true;
  const allCorrect = stmts.every((s, i) => state.room5Sel[i] === s.correct);
  save();
  render();
  const fb = document.getElementById("fb");
  if (allCorrect) {
    sndCorrect();
    if (fb) { fb.textContent = "✔ כל הטענות סומנו נכון! הכספת נפתחת..."; fb.className = "feedback ok"; }
    setTimeout(winGame, 1100);
  } else {
    sndWrong();
    const card = document.querySelector(".stage");
    if (card) { card.classList.remove("shake"); void card.offsetWidth; card.classList.add("shake"); }
    const wrongCount = stmts.filter((s, i) => state.room5Sel[i] !== s.correct).length;
    if (fb) {
      fb.textContent = `${wrongCount} טענות סומנו בטעות (מסומנות ב-✖). תקנו ונסו שוב.`;
      fb.className = "feedback err";
    }
  }
}

function winGame() {
  stopTimer();
  state.finished = true;
  state.finalTime = state.elapsed;
  save();
  // Render the victory screen and fire confetti regardless of the starting
  // level (the control panel may be partially empty) and independently of any
  // audio error, so the celebration always plays on a win.
  render();
  try { sndVictory(); } catch (e) {}
  launchConfetti();
}

function renderVictory() {
  document.getElementById("hintBtn").style.display = "none";
  const codes = state.collectedCodes
    .filter((c) => c != null)
    .map((c) => String(c).padStart(2, "0"))
    .join("");
  const codeLine = codes
    ? `<p>הקוד שאספתם: <b style="color:var(--cyan);letter-spacing:4px">${codes}</b></p>`
    : "";
  const fromLevel = state.startLevel && state.startLevel > 1
    ? `<p>התחלתם מרמה ${state.startLevel} והגעתם עד הסוף.</p>` : "";
  app().innerHTML = `
    <div class="stage victory">
      <div class="v-title">🎉 הכספת נפרצה בהצלחה!</div>
      <p>כל הכבוד! עברתם את כל מתחמי האבטחה ופתחתם את הכספת של אוקלידס.</p>
      ${fromLevel}
      <div class="v-time">⏱ זמן סופי: ${fmtTime(state.finalTime)}</div>
      ${codeLine}
      <button class="btn big green" onclick="playAgain()">🔄 שחקו שוב</button>
    </div>`;
}

function playAgain() {
  sndClick();
  state = freshState();
  save();
  render();
}

// ---- Hints ----------------------------------------------------------------
function showHint() {
  let hintText = "";
  if (state.currentRoom >= 1 && state.currentRoom <= 4) {
    hintText = roomHint(state.currentRoom);
  } else if (state.currentRoom === 5) {
    const wrong = [];
    ROOM5.statements.forEach((s, i) => { if (state.room5Sel[i] !== s.correct) wrong.push(i + 1); });
    hintText = wrong.length
      ? ("בדקו שוב את הסעיפים הבאים: " + wrong.join(", ") + ".")
      : "כל הסעיפים מסומנים נכון — לחצו על \"בדיקת השילוב\".";
  }
  if (!hintText) return;

  // avoid duplicate hint boxes
  const existing = document.getElementById("hintBox");
  if (existing) { existing.remove(); return; }

  const card = document.querySelector(".stage");
  if (!card) return;
  const box = document.createElement("div");
  box.id = "hintBox";
  box.className = "hint-box";
  box.innerHTML = "💡 <b>רמז:</b> " + hintText;
  card.appendChild(box);
  sndClick();
}

// ---- Confetti -------------------------------------------------------------
function launchConfetti() {
  const canvas = document.getElementById("confetti");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  if (!ctx) return;
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener("resize", resize);

  const colors = ["#2bff88", "#38e1ff", "#ff9d3c", "#ffd34d", "#ff4d6d"];
  const pieces = [];
  for (let i = 0; i < 180; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * canvas.height,
      w: 6 + Math.random() * 8,
      h: 8 + Math.random() * 10,
      color: colors[(Math.random() * colors.length) | 0],
      vy: 2 + Math.random() * 4,
      vx: -2 + Math.random() * 4,
      rot: Math.random() * Math.PI,
      vr: -0.2 + Math.random() * 0.4,
    });
  }

  let frames = 0;
  const maxFrames = 60 * 7; // ~7 seconds
  function frame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach((p) => {
      p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      if (p.y > canvas.height + 20) { p.y = -20; p.x = Math.random() * canvas.width; }
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    });
    frames++;
    if (frames < maxFrames) requestAnimationFrame(frame);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  frame();
}

// ---- Boot -----------------------------------------------------------------
function boot() {
  // Always start a fresh game on page load (no resume from a previous session).
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
  // unlock audio on first interaction (browser policy)
  document.addEventListener("click", () => ac(), { once: true });
  render();
}
boot();
</script>
